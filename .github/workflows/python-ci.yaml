name: Python CI

on:
  push:
    branches: [ "main", "feature/api-integration" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/projects/ML Scripts

    # Step 1: Spin up a temporary MySQL database in the cloud
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: lol_prediction_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv mysql-connector-python \
                    flask flask-cors pytest pytest-html \
                    xgboost pandas numpy

    - name: Run API Connection Test
      env:
        RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      run: python api_setup/tests/test_riot_api_connection.py

    - name: Run API Security Test
      run: python api_setup/tests/test_security.py

    - name: Run Database Tests (pytest)
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        python -m database_setup.db_manager
        pytest database_setup/tests/ -v --tb=short \
          --html=test-reports/db-report.html --self-contained-html

    - name: Run Flask Endpoint Tests (pytest)
      env:
        RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        pytest api_setup/tests/test_flask_endpoints.py -v --tb=short \
          --html=test-reports/flask-report.html --self-contained-html

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-html-reports
        path: test-reports/
